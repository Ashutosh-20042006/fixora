<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIXORA Notifications</title>
  <link rel="icon" type="image/png" href="fixorra_logo-removebg-preview.png">
  <style>
    :root {
      --bg: #0a1022;
      --card: #141c34;
      --text: #eef3ff;
      --muted: #a9b8dc;
      --border: #2b3b67;
      --accent: #5ea2ff;
      --unread: #91c4ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 14% 12%, #27448f 0%, transparent 38%),
        radial-gradient(circle at 86% 86%, #3d2a73 0%, transparent 36%),
        linear-gradient(145deg, #070b18 0%, #0d1530 52%, #090f22 100%);
      color: var(--text);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 34px;
      border-bottom: 1px solid var(--border);
      background: rgba(20, 28, 52, 0.95);
      backdrop-filter: blur(6px);
      position: sticky;
      top: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
    }

    .brand-logo {
      width: 38px;
      height: 38px;
      object-fit: contain;
      filter: brightness(0) invert(1) opacity(0.9);
    }

    .top-links {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .top-links a {
      color: #d9e5ff;
      text-decoration: none;
      font-weight: 600;
    }

    .page-wrap {
      width: min(980px, 94%);
      margin: 26px auto;
      display: grid;
      gap: 16px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(94, 162, 255, 0.2), rgba(125, 101, 255, 0.12));
      border: 1px solid rgba(118, 149, 255, 0.35);
      border-radius: 16px;
      padding: 18px;
    }

    .hero h1 {
      font-size: clamp(1.3rem, 2vw, 1.8rem);
      margin-bottom: 8px;
    }

    .hero p {
      color: var(--muted);
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(170px, 1fr));
      gap: 12px;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
    }

    .mark-btn {
      border: none;
      background: linear-gradient(145deg, #6cb1ff, #7a7dff);
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .notification-list {
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .notification-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px;
      display: grid;
      gap: 6px;
    }

    .notification-item.unread {
      border-color: #5d8dff;
      box-shadow: inset 0 0 0 1px rgba(145, 196, 255, 0.28);
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .pill {
      border: 1px solid #3f5b9d;
      border-radius: 999px;
      font-size: 0.72rem;
      color: #d8e6ff;
      padding: 3px 9px;
    }

    .title {
      font-size: 1rem;
      font-weight: 700;
    }

    .desc {
      color: #dce7ff;
      line-height: 1.45;
      font-size: 0.92rem;
    }

    .meta {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 18px;
      text-align: center;
      color: var(--muted);
      background: rgba(20, 28, 52, 0.55);
    }

    @media (max-width: 760px) {
      .stats-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <img class="brand-logo" src="fixorra_logo-removebg-preview.png" alt="FIXORA logo">
      <span>FIXORA Notifications</span>
    </div>
    <nav class="top-links">
      <a href="index.html">Home</a>
      <a href="developer.html">Developer</a>
      <a href="#" aria-label="Profile">👤</a>
    </nav>
  </header>

  <main class="page-wrap">
    <section class="hero">
      <h1>Stay updated with community activity</h1>
      <p>Track newly reported problems and system alerts in one place.</p>
    </section>

    <section class="stats-row">
      <article class="stat">
        <p class="stat-label">Total Notifications</p>
        <p id="totalCount" class="stat-value">0</p>
      </article>
      <article class="stat">
        <p class="stat-label">Unread</p>
        <p id="unreadCount" class="stat-value">0</p>
      </article>
      <article class="stat">
        <p class="stat-label">Today</p>
        <p id="todayCount" class="stat-value">0</p>
      </article>
    </section>

    <section class="actions">
      <button id="markReadBtn" class="mark-btn" type="button">Mark all as read</button>
    </section>

    <ul id="notificationList" class="notification-list"></ul>
  </main>

  <script type="module" src="notifications.js"></script>
</body>
</html>
